<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Kart</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #27ae60; margin-bottom: 5px; font-size: 36px; }
        .tagline { color: #7f8c8d; font-size: 16px; margin-bottom: 30px; }
        .container { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; margin-top: 20px; }
        .card { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 280px; padding: 20px; text-align: center; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .card h3 { color: #333; margin: 15px 0 10px; }
        .card p { color: #2ccac0; font-size: 20px; font-weight: bold; margin: 0 0 15px; }
        .btn { background: #27ae60; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:hover { background: #219150; }
    </style>
</head>
<body>

    <h1 id="shop-name">🛍️ Fresh Kart 🛍️</h1>
    <p class="tagline" id="shop-tagline">Loading...</p>

    <div class="container" id="products-list"></div>

    <script>
        function loadProducts() {
            fetch('http://127.0.0.1:5000/get-shop-data')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('shop-name').innerText = data.info.name;
                    document.getElementById('shop-tagline').innerText = data.info.tagline;
                    
                    const list = document.getElementById('products-list');
                    list.innerHTML = '';
                    data.products.forEach(p => {
                        list.innerHTML += `
                            <div class="card">
                                <img src="${p.image}" alt="${p.name}">
                                <h3>${p.name}</h3>
                                <p>${p.price}</p>
                                <button class="btn" onclick="openOrderForm('${p.name}')">Buy Now</button>
                            </div>
                        `;
                    });
                })
                .catch(err => alert("Samaan load nahi ho paya! Server check karein."));
        }

        window.onload = loadProducts;

        // Jab customer Buy Now dabayega
        function openOrderForm(productName) {
            const name = prompt("Apna Naam bharein:");
            if (!name) return;
            const phone = prompt("Apna Phone Number bharein:");
            if (!phone) return;
            const address = prompt("Apna Poora Address bharein:");
            if (!address) return;

            // Data ko backend par bhej rahe hain
            fetch('http://127.0.0.1:5000/buy-product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    product_name: productName,
                    customer_name: name,
                    customer_phone: phone,
                    customer_address: address
                })
            })
            .then(res => res.json())
            .then(data => alert(data.message))
            .catch(err => alert("Order fail ho gaya!"));
        }
    </script>
</body>
</html>
